spring:
  application:
    name: devskills
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# A autenticação do Supabase agora utiliza chaves assimétricas (ECC P-256).
# O Spring Boot vai baixar a chave pública automaticamente dessa URL:
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${SUPABASE_URL}/auth/v1/.well-known/jwks.json

server:
  port: 8080
